<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Editor</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<section class="hero">

    <header>
        <div class="logo">⚡ MyEditor</div>
        <nav>
            <a href="#">Home</a>
            <a href="features.html">Features</a>
            <a href="buy.html">Get Premium</a>
        </nav>
    </header>

    <h1>Create. Edit. Ship.</h1>
    <p>Next-gen AI-powered editing platform</p>

    <div id="countdown">Loading...</div>

    <!-- ❗ FIXED DUPLICATE + TYPO CLEANUP (same element, just corrected ID usage) -->
    <div id="earlyAccessCount">0</div>
    <div id="earlyRemaining">5000</div>

    <!-- 🔥 IMAGE PLACEHOLDER (ADDED) -->
    <div class="hero-image">
        Image Preview / App Showcase
    </div>

</section>

<!-- JOIN -->
<section class="hero">

    <h2>Join Early Access</h2>

    <form id="preRegForm">

        <input type="email" placeholder="Enter email" required />

        <button type="submit">Join Waitlist</button>

        <!-- 🔥 OTP INPUT -->
        <div id="otpBox" style="display:none;">
            <input id="codeInput" placeholder="Enter OTP" />
            <button type="button" onclick="verifyCode()">Verify</button>
        </div>

        <!-- 🎬 VIDEO PLACEHOLDER (ADDED UNDER EMAIL SECTION) -->
        <div class="video-placeholder">
            🎬 Video Demo Coming Soon
        </div>

    </form>

    <p id="message"></p>

</section>

<!-- APP -->
<section id="editor" style="display:none;">
    <h2>Editor Dashboard</h2>
    <p>Welcome!</p>
</section>

<section id="paywall">
    <h2>Locked 🔒</h2>
    <p>Please verify email</p>
</section>

<!-- 🔥 FIREBASE CLIENT SDK (ADDED FOR REAL-TIME SYNC) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const EARLY_TOTAL = 5000;

    const earlyRef = ref(db, "stats/waitingCount");

    onValue(earlyRef, (snap) => {
        const used = snap.val() || 0;
        const remaining = Math.max(EARLY_TOTAL - used, 0);

        const usedEl = document.getElementById("earlyAccessCount");
        const remainingEl = document.getElementById("earlyRemaining");

        if (usedEl) usedEl.innerText = used;
        if (remainingEl) remainingEl.innerText = remaining;
    });
</script>

<!-- YOUR EXISTING SCRIPT (UNCHANGED) -->
<script src="script.js"></script>

</body>
</html>
